<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careloop - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>


/* ============================================
   CARELOOP — MOBILE RESPONSIVE (paste into every page)
   ============================================ */
@media (max-width: 480px) {

  body {
    padding: 0;
    align-items: flex-start;
    min-height: 100dvh;
  }

  .container {
    max-width: 100%;
    width: 100%;
    padding: 80px 24px 40px;
    min-height: 100dvh;
  }

  /* Logo */
  .logo-container { margin-bottom: 1.5rem; }
  #logo-img { height: 32px; }

  /* Headings */
  h1 {
    font-size: 1.75rem;
    margin-bottom: 0.4rem;
  }

  .subtext {
    font-size: 13px;
    margin-bottom: 1.5rem;
  }

  /* Inputs */
  input[type="email"],
  input[type="password"],
  input[type="text"],
  input[type="tel"] {
    font-size: 16px; /* prevents iOS zoom on focus */
    padding: 14px 16px;
    border-radius: 10px;
  }

  .password-wrapper input {
    padding-right: 48px;
  }

  /* Buttons */
  .primary-button,
  .submit-button,
  .proceed-button,
  .access-button {
    padding: 16px;
    font-size: 15px;
    border-radius: 50px;
    width: 100%;
  }

  /* Forgot password link */
  .forgot-password-link { margin-bottom: 1.2rem; }

  /* Bottom links */
  .signup-link,
  .back-link { font-size: 13px; margin-top: 1.2rem; }

  /* Password rules popover — make static on mobile */
  .password-rules,
  .password-conditions {
    position: static;
    opacity: 1;
    visibility: visible;
    margin-top: 10px;
    border-radius: 10px;
  }

  /* ── Modals / Overlays ── */
  .success-overlay,
  .reset-overlay {
    padding: 24px;
    align-items: flex-end; /* sheet slides up from bottom */
  }

  .success-modal,
  .reset-modal {
    border-radius: 20px 20px 16px 16px;
    padding: 32px 24px;
    width: 100%;
    max-width: 100%;
  }

  .success-icon,
  .reset-icon {
    width: 88px;
    height: 88px;
    margin-bottom: 18px;
  }

  .success-title { font-size: 1.4rem; }
  .success-message { font-size: 13px; }

  /* email-verified.html */
  .success-container {
    border-radius: 0;
    box-shadow: none;
    padding: 80px 24px 40px;
    min-height: 100dvh;
  }

  .btn { width: 100%; justify-content: center; }
  .btn-container { flex-direction: column; gap: 10px; }
  .additional-info { margin-top: 28px; }

  /* signup-success.html */
  .instructions { padding: 1rem; }
  .email-highlight { padding: 0.75rem; }
}

@media (max-width: 360px) {
  h1 { font-size: 1.5rem; }
  .container { padding: 60px 20px 32px; }
}
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {

        h1 {
            font-size: 2rem; font-weight: 700;
            color: #111827; text-align: center; margin-bottom: 0.5rem;
        }

        .subtext {
            font-size: 0.9rem; color: #9ca3af;
            text-align: center; margin-bottom: 2rem;
        }

        .form-group { margin-bottom: 1.5rem; }

        label {
            display: block; font-size: 14px;
            font-weight: 500; margin-bottom: 0.5rem; color: #374151;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%; padding: 0.78rem 1rem;
            border: 1px solid #d1d5db; border-radius: 8px;
            font-size: 0.9rem; font-family: inherit;
            background: white; color: #111827;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        input:focus {
            outline: none;
            border-color: #3c4fe0;
            box-shadow: 0 0 0 3px rgba(60,79,224,0.1);
        }

        input::placeholder { color: #9ca3af; }

        .password-wrapper { position: relative; width: 100%; }
        .password-wrapper input { padding-right: 2.8rem; }

        .eye-toggle {
            position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            padding: 0; color: #9ca3af;
            display: flex; align-items: center;
        }
        .eye-toggle:hover { color: #6b7280; }

        .password-conditions {
            background: #fff; border: 1px solid #e5e7eb;
            border-radius: 12px; padding: 16px 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.07);
            margin-top: 10px; display: none;
        }
        .password-conditions.show { display: block; }
        .password-conditions h3 {
            font-size: 0.82rem; font-weight: 600;
            color: #111827; margin-bottom: 10px;
        }
        .password-conditions ul { list-style: none; padding: 0; }
        .password-conditions li {
            font-size: 0.82rem; color: #9ca3af; margin-bottom: 6px;
        }

        .forgot-password-link {
            text-align: right; margin-top: 0.5rem; margin-bottom: 1.5rem;
        }
        .forgot-password-link a {
            font-size: 0.82rem; color: #3c4fe0;
            font-weight: 500; text-decoration: none;
        }
        .forgot-password-link a:hover { text-decoration: underline; }

        /* ═══════════════════════════════════════════════
           BUTTON — 3 pure CSS states, zero image files.
           Styled from CTA.jpg:
             active   = solid #3c4fe0, white "Login" text,
                        border-radius 50px, full width
             inactive = muted lavender (fields empty)
             loading  = same blue + animated dots
        ═══════════════════════════════════════════════ */
        .btn-wrap { width: 100%; margin-bottom: 1.2rem; }

        .submit-button {
            width: 100%;
            padding: 15px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 500;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.1px;
            transition: filter 0.15s, transform 0.1s;
        }

        /* Inactive — lavender/muted, non-interactive */
        .submit-button.state-inactive {
            background: #c7caef;
            color: #7880c9;
            cursor: default;
            pointer-events: none;
        }

        /* Active — exact match to CTA.jpg */
        .submit-button.state-active {
            background: #3c4fe0;
            color: #ffffff;
        }
        .submit-button.state-active:hover {
            filter: brightness(0.91);
            transform: translateY(-1px);
        }
        .submit-button.state-active:active {
            filter: brightness(0.86);
            transform: translateY(0);
        }

        /* Loading — same blue, animated dots */
        .submit-button.state-loading {
            background: #3c4fe0;
            color: #3c4fe0;
            cursor: not-allowed;
            pointer-events: none;
        }

        .dot-loader {
            display: flex; align-items: center; gap: 5px;
        }
        .dot-loader span {
            width: 7px; height: 7px;
            background: #ffffff; border-radius: 50%;
            animation: dotPulse 1.2s infinite ease-in-out;
        }
        .dot-loader span:nth-child(1) { animation-delay: 0s;   }
        .dot-loader span:nth-child(2) { animation-delay: 0.2s; }
        .dot-loader span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
            40%            { transform: scale(1.0); opacity: 1.0; }
        }

        /* Sign up row */
        .signup-link {
            text-align: center; font-size: 0.85rem; color: #111827; font-weight: 500;
        }
        .signup-link a {
            color: #3c4fe0; font-weight: 700;
            text-decoration: none; margin-left: 3px;
        }
        .signup-link a:hover { text-decoration: underline; }

    </style>
</head>
<script>(function(){var d=localStorage.getItem('cl_dark')==='1';var e=localStorage.getItem('cl_eye')==='1';if(d)document.documentElement.classList.add('dark');if(e)document.documentElement.classList.add('eyecare');})();</script>
<body>
<div class="container">

    <!-- LOGO PLACEHOLDER — replace src with final asset path -->
    <div class="logo-container">
        <img id="logo-img" src="assets/primary_logo.jpg" alt="Careloop">
    </div>

    <h1>Welcome back!</h1>
    <p class="subtext">Ready to stay consistent today?</p>

    <form id="login-form">

        <!-- Email -->
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email"
                   placeholder="Enter your Email Address"
                   autocomplete="email" required>
        </div>

        <!-- Password -->
        <div class="form-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" name="password"
                       placeholder="••••••"
                       autocomplete="current-password" required>
                <button type="button" class="eye-toggle" id="eye-toggle" aria-label="Toggle password">
                    <svg id="eye-off" width="18" height="18" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="1.8"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
                        <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                    <svg id="eye-on" width="18" height="18" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="1.8"
                         stroke-linecap="round" stroke-linejoin="round"
                         style="display:none;">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>

            <!-- Password conditions -->
            <div class="password-conditions" id="password-conditions">
                <h3>Your Password must have:</h3>
                <ul>
                    <li>At least 8 characters</li>
                    <li>Upper and lowercase characters</li>
                    <li>At least one number</li>
                </ul>
            </div>
        </div>

        <!-- Forgot password -->
        <div class="forgot-password-link">
            <a href="forgot-password.html">Forgot Password</a>
        </div>

        <!-- ═══════════════════════════════════════
             BUTTON — CSS only, 3 states:
               state-inactive  → fields empty (default)
               state-active    → any field has content
               state-loading   → form submitting
        ═══════════════════════════════════════ -->
        <div class="btn-wrap">
            <button type="submit"
                    class="submit-button state-inactive"
                    id="submit-button">
                Login
            </button>
        </div>

        <!-- Sign up link -->
        <div class="signup-link">
            Don't have an account?<a href="/">Sign Up</a>
        </div>

    </form>
</div>

<script>
const API_URL = "https://careloop-production-0243.up.railway.app";
    const emailInput    = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitBtn     = document.getElementById('submit-button');
    const eyeToggle     = document.getElementById('eye-toggle');
    const eyeOff        = document.getElementById('eye-off');
    const eyeOn         = document.getElementById('eye-on');

    /* ── Button state ── */
    function setBtn(state) {
        submitBtn.className = 'submit-button state-' + state;
        if (state === 'loading') {
            submitBtn.innerHTML =
                '<div class="dot-loader"><span></span><span></span><span></span></div>';
        } else {
            submitBtn.textContent = 'Login';
        }
    }

    function evalBtn() {
        if (submitBtn.className.includes('loading')) return;
        const any = emailInput.value.trim() || passwordInput.value.trim();
        setBtn(any ? 'active' : 'inactive');
    }

    emailInput.addEventListener('input', evalBtn);
    passwordInput.addEventListener('input', evalBtn);

    /* ── Eye toggle ── */
    eyeToggle.addEventListener('click', function () {
        const hidden = passwordInput.type === 'password';
        passwordInput.type    = hidden ? 'text'    : 'password';
        eyeOff.style.display  = hidden ? 'none'    : 'inline';
        eyeOn.style.display   = hidden ? 'inline'  : 'none';
    });

    /* ── Password conditions ── */
    passwordInput.addEventListener('focus', function () {
        document.getElementById('password-conditions').classList.add('show');
    });
    passwordInput.addEventListener('blur', function () {
        setTimeout(function () {
            document.getElementById('password-conditions').classList.remove('show');
        }, 150);
    });

    /* ── Form submit ── */
    document.getElementById('login-form').addEventListener('submit', async function (e) {
        e.preventDefault();

        const email    = emailInput.value.trim();
        const password = passwordInput.value.trim();

        if (!email || !email.includes('@')) {
            alert('Please enter a valid email address.'); return;
        }
        if (!password) {
            alert('Please enter your password.'); return;
        }

        setBtn('loading');

        try {
            const response = await fetch(`${API_URL}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok && data.access_token) {
                localStorage.setItem('authToken', data.access_token);
                localStorage.setItem('cl_user', JSON.stringify({
                    name: data.user?.full_name || email.split('@')[0],
                    business: data.user?.business_name || '',
                    avatar: data.user?.avatar || null
                }));
                setBtn('active');
                setTimeout(function () {
                    window.location.href = 'careloop-dashboard.html';
                }, 800);
            } else {
                throw new Error(data.detail || 'Login failed');
            }
        } catch (error) {
            alert(error.message || 'Login failed. Please check your credentials and try again.');
            setBtn('active');
        }
    });
</script>
</body>
