<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careloop - Create Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>

        /* ============================================
   CARELOOP — MOBILE RESPONSIVE (paste into every page)
   ============================================ */
@media (max-width: 480px) {

  body {
    padding: 0;
    align-items: flex-start;
    min-height: 100dvh;
  }

  .container {
    max-width: 100%;
    width: 100%;
    padding: 80px 24px 40px;
    min-height: 100dvh;
  }

  /* Logo */
  .logo-container { margin-bottom: 1.5rem; }
  #logo-img { height: 32px; }

  /* Headings */
  h1 {
    font-size: 1.75rem;
    margin-bottom: 0.4rem;
  }

  .subtext {
    font-size: 13px;
    margin-bottom: 1.5rem;
  }

  /* Inputs */
  input[type="email"],
  input[type="password"],
  input[type="text"],
  input[type="tel"] {
    font-size: 16px; /* prevents iOS zoom on focus */
    padding: 14px 16px;
    border-radius: 10px;
  }

  .password-wrapper input {
    padding-right: 48px;
  }

  /* Buttons */
  .primary-button,
  .submit-button,
  .proceed-button,
  .access-button {
    padding: 16px;
    font-size: 15px;
    border-radius: 50px;
    width: 100%;
  }

  /* Forgot password link */
  .forgot-password-link { margin-bottom: 1.2rem; }

  /* Bottom links */
  .signup-link,
  .back-link { font-size: 13px; margin-top: 1.2rem; }

  /* Password rules popover — make static on mobile */
  .password-rules,
  .password-conditions {
    position: static;
    opacity: 1;
    visibility: visible;
    margin-top: 10px;
    border-radius: 10px;
  }

  /* ── Modals / Overlays ── */
  .success-overlay,
  .reset-overlay {
    padding: 24px;
    align-items: flex-end; /* sheet slides up from bottom */
  }

  .success-modal,
  .reset-modal {
    border-radius: 20px 20px 16px 16px;
    padding: 32px 24px;
    width: 100%;
    max-width: 100%;
  }

  .success-icon,
  .reset-icon {
    width: 88px;
    height: 88px;
    margin-bottom: 18px;
  }

  .success-title { font-size: 1.4rem; }
  .success-message { font-size: 13px; }

  /* email-verified.html */
  .success-container {
    border-radius: 0;
    box-shadow: none;
    padding: 80px 24px 40px;
    min-height: 100dvh;
  }

  .btn { width: 100%; justify-content: center; }
  .btn-container { flex-direction: column; gap: 10px; }
  .additional-info { margin-top: 28px; }

  /* signup-success.html */
  .instructions { padding: 1rem; }
  .email-highlight { padding: 0.75rem; }
}

@media (max-width: 360px) {
  h1 { font-size: 1.5rem; }
  .container { padding: 60px 20px 32px; }
}
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        .container {
            width: 100%;
            max-width: 460px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 2rem;
        }

        #logo-img {
            height: 38px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #111827;
            text-align: center;
            margin-bottom: 1rem;
        }

        .subtext {
            font-size: 14px;
            color: #9ca3af;
            text-align: center;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #374151;
        }

        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .password-wrapper input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 40px 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s ease;
            background: white;
        }

        .password-wrapper input:focus {
            outline: none;
            border-color: #3c4fe0;
            box-shadow: 0 0 0 3px rgba(60, 79, 224, 0.1);
        }

        .password-wrapper input::placeholder {
            color: #9ca3af;
        }

        .eye-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .eye-toggle svg {
            display: block;
            width: 18px;
            height: 18px;
            stroke: #9ca3af;
        }

        .error-message {
            font-size: 12px;
            color: #f87171;
            margin-top: 0.5rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .password-rules {
            position: absolute;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            top: 100%;
            left: 0;
            right: 0;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.15s ease, visibility 0.15s ease;
        }

        .password-rules.show {
            opacity: 1;
            visibility: visible;
        }

        .password-rules h3 {
            font-size: 13.5px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 10px;
        }

        .password-rules ul {
            list-style: none;
            padding: 0;
        }

        .password-rules li {
            font-size: 13.5px;
            color: #9ca3af;
            line-height: 2;
            margin-bottom: 0;
        }

        .primary-button {
            background: #3c4fe0;
            color: #ffffff;
            border: none;
            border-radius: 50px;
            width: 100%;
            padding: 15px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: filter 0.2s ease;
        }

        .primary-button:hover {
            filter: brightness(0.9);
        }

        .back-link {
            text-align: center;
            font-size: 13.5px;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: #3c4fe0;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .success-overlay {
            position: fixed;
            inset: 0;
            background: rgba(30, 30, 30, 0.85);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .success-overlay.active {
            display: flex;
        }

        .success-modal {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px 36px;
            max-width: 420px;
            width: 90%;
            text-align: center;
        }

        .success-icon {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: block;
            margin: 0 auto 24px;
        }

        .success-title {
            font-size: 2rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 8px;
        }

        .success-message {
            font-size: 14px;
            color: #374151;
            margin-bottom: 28px;
        }

        .proceed-button {
            background: #3c4fe0;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            width: 100%;
            padding: 15px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: filter 0.2s ease;
        }

        .proceed-button:hover {
            filter: brightness(0.9);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img id="logo-img" src="assets/primary_logo.jpg" alt="Careloop">
        </div>

        <h1>Create Password</h1>
        <p class="subtext">Input your choice of password</p>

        <form id="create-form">
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="••••" required>
                    <button type="button" class="eye-toggle" onclick="togglePassword('password')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
                            <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
                <div class="password-rules" id="password-rules">
                    <h3>Your Password must have:</h3>
                    <ul>
                        <li>At least 8 characters</li>
                        <li>Upper and lowercase characters</li>
                        <li>At least one number</li>
                    </ul>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••" required>
                    <button type="button" class="eye-toggle" onclick="togglePassword('confirmPassword')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
                            <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
                <div class="error-message" id="confirm-error">Passwords do not match</div>
            </div>

            <button type="submit" class="primary-button" id="login-button">Create Password</button>

            <div class="back-link">
                Back to <a href="/login">Sign In</a>
            </div>
        </form>

        <div class="success-overlay" id="success-overlay">
            <div class="success-modal">
                <img class="success-icon" src="assets/Circle__1_.jpg" alt="Success">
                <h2 class="success-title">Password Successful</h2>
                <p class="success-message">Your password has been successfully created.</p>
                <button class="proceed-button" onclick="window.location.href='/login'">Proceed to Login</button>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const button = field.nextElementSibling;
            
            if (field.type === 'password') {
                field.type = 'text';
                button.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                `;
            } else {
                field.type = 'password';
                button.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
                        <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                `;
            }
        }

        function showPasswordRules() {
            document.getElementById('password-rules').classList.add('show');
        }

        function hidePasswordRules() {
            setTimeout(() => {
                document.getElementById('password-rules').classList.remove('show');
            }, 150);
        }

        function validateForm() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const confirmError = document.getElementById('confirm-error');
            
            confirmError.classList.remove('show');
            
            if (!password) return false;
            if (password.length < 8) return false;
            if (!/[A-Z]/.test(password)) return false;
            if (!/[a-z]/.test(password)) return false;
            if (!/\d/.test(password)) return false;
            if (password !== confirmPassword) {
                confirmError.classList.add('show');
                return false;
            }
            return true;
        }

        async function submitForm(e) {
            e.preventDefault();
            if (!validateForm()) return;
            
            const password = document.getElementById('password').value;
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            
            if (!token) {
                alert('Invalid password reset link. Please request a new password reset.');
                return;
            }
            
            const button = document.getElementById('login-button');
            button.textContent = 'Creating...';
            button.disabled = true;
            
            try {
                const response = await fetch('/api/auth/set-initial-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, password: password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert('Password created successfully! Redirecting to login...');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    throw new Error(data.detail || 'Password creation failed');
                }
            } catch (error) {
                alert(error.message);
                button.textContent = 'Create Password';
                button.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('password').addEventListener('focus', showPasswordRules);
            document.getElementById('password').addEventListener('blur', hidePasswordRules);
            document.getElementById('create-form').addEventListener('submit', submitForm);
        });
    </script>
</body>
</html>
