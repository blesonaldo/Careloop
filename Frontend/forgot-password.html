<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careloop - Forgot Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>

        /* ============================================
   CARELOOP — MOBILE RESPONSIVE (paste into every page)
   ============================================ */
@media (max-width: 480px) {

  body {
    padding: 0;
    align-items: flex-start;
    min-height: 100dvh;
  }

  .container {
    max-width: 100%;
    width: 100%;
    padding: 80px 24px 40px;
    min-height: 100dvh;
  }

  /* Logo */
  .logo-container { margin-bottom: 1.5rem; }
  #logo-img { height: 32px; }

  /* Headings */
  h1 {
    font-size: 1.75rem;
    margin-bottom: 0.4rem;
  }

  .subtext {
    font-size: 13px;
    margin-bottom: 1.5rem;
  }

  /* Inputs */
  input[type="email"],
  input[type="password"],
  input[type="text"],
  input[type="tel"] {
    font-size: 16px; /* prevents iOS zoom on focus */
    padding: 14px 16px;
    border-radius: 10px;
  }

  .password-wrapper input {
    padding-right: 48px;
  }

  /* Buttons */
  .primary-button,
  .submit-button,
  .proceed-button,
  .access-button {
    padding: 16px;
    font-size: 15px;
    border-radius: 50px;
    width: 100%;
  }

  /* Forgot password link */
  .forgot-password-link { margin-bottom: 1.2rem; }

  /* Bottom links */
  .signup-link,
  .back-link { font-size: 13px; margin-top: 1.2rem; }

  /* Password rules popover — make static on mobile */
  .password-rules,
  .password-conditions {
    position: static;
    opacity: 1;
    visibility: visible;
    margin-top: 10px;
    border-radius: 10px;
  }

  /* ── Modals / Overlays ── */
  .success-overlay,
  .reset-overlay {
    padding: 24px;
    align-items: flex-end; /* sheet slides up from bottom */
  }

  .success-modal,
  .reset-modal {
    border-radius: 20px 20px 16px 16px;
    padding: 32px 24px;
    width: 100%;
    max-width: 100%;
  }

  .success-icon,
  .reset-icon {
    width: 88px;
    height: 88px;
    margin-bottom: 18px;
  }

  .success-title { font-size: 1.4rem; }
  .success-message { font-size: 13px; }

  /* email-verified.html */
  .success-container {
    border-radius: 0;
    box-shadow: none;
    padding: 80px 24px 40px;
    min-height: 100dvh;
  }

  .btn { width: 100%; justify-content: center; }
  .btn-container { flex-direction: column; gap: 10px; }
  .additional-info { margin-top: 28px; }

  /* signup-success.html */
  .instructions { padding: 1rem; }
  .email-highlight { padding: 0.75rem; }
}

@media (max-width: 360px) {
  h1 { font-size: 1.5rem; }
  .container { padding: 60px 20px 32px; }
}
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        .container {
            width: 100%;
            max-width: 460px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 2rem;
        }

        /* LOGO PLACEHOLDER - replace src with final asset path */
        #logo-img {
            height: 38px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #111827;
            text-align: center;
            margin-bottom: 1rem;
        }

        .subtext {
            font-size: 14px;
            color: #9ca3af;
            text-align: center;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #374151;
        }

        input[type="email"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s ease;
            background: white;
        }

        input[type="email"]:focus {
            outline: none;
            border-color: #3c4fe0;
            box-shadow: 0 0 0 3px rgba(60, 79, 224, 0.1);
        }

        input::placeholder {
            color: #9ca3af;
        }

        .error-message {
            font-size: 12px;
            color: #f87171;
            margin-top: 0.5rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .primary-button {
            background: #3c4fe0;
            color: #ffffff;
            border: none;
            border-radius: 50px;
            width: 100%;
            padding: 15px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: filter 0.2s ease;
        }

        .primary-button:hover {
            filter: brightness(0.9);
        }

        .back-link {
            text-align: center;
            font-size: 13.5px;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: #3c4fe0;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        /* Reset Instructions Overlay */
        .reset-overlay {
            position: fixed;
            inset: 0;
            background: rgba(30, 30, 30, 0.85);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .reset-overlay.active {
            display: flex;
        }

        .reset-modal {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px 36px;
            max-width: 420px;
            width: 90%;
            text-align: center;
        }

        .reset-icon {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: block;
            margin: 0 auto 24px;
        }

        .reset-text-1 {
            font-size: 15px;
            color: #9ca3af;
            text-align: center;
            font-weight: 400;
            margin-bottom: 4px;
        }

        .reset-text-2 {
            font-size: 15px;
            color: #3c4fe0;
            font-weight: 600;
            text-align: center;
            margin-top: 4px;
        }

        .access-button {
            background: #3c4fe0;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            width: 100%;
            padding: 15px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: filter 0.2s ease;
            margin-top: 28px;
        }

        .access-button:hover {
            filter: brightness(0.9);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo -->
        <div class="logo-container">
            <!-- LOGO PLACEHOLDER - replace src with final asset path -->
            <img id="logo-img" src="assets/primary_logo.jpg" alt="Careloop">
        </div>

        <!-- Heading -->
        <h1>Forgot Password</h1>
        <p class="subtext">We will send reset instructions to your email address</p>

        <!-- Form -->
        <form id="forgot-form">
            <div class="form-group">
                <label for="resetEmail">Email Address</label>
                <input type="email" id="resetEmail" name="email" placeholder="Enter your Email Address" required>
                <div class="error-message" id="email-error">Please enter a valid email address</div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="primary-button" id="next-button">Next</button>

            <!-- Back Link -->
            <div class="back-link">
                Back to <a href="careloop-signup.html">Sign In</a>
            </div>
        </form>

        <!-- Reset Instructions Overlay -->
        <div class="reset-overlay" id="reset-overlay">
            <div class="reset-modal">
                <img class="reset-icon" src="assets/Circle__1_.jpg" alt="Success">
                
                <p class="reset-text-1">We have sent reset instructions to</p>
                <p class="reset-text-2" id="reset-email">user@example.com</p>
                
                <button class="access-button" onclick="window.location.href='reset-password.html?email=' + encodeURIComponent(document.getElementById('reset-email').textContent)">Access Email</button>
            </div>
        </div>
    </div>

    <script>
        // Form validation
        function validateForm() {
            const email = document.getElementById('resetEmail').value.trim();
            const errorElement = document.getElementById('email-error');
            
            if (!email) {
                errorElement.classList.add('show');
                return false;
            }
            
            // Basic email validation
            if (!email.includes('@') || !email.includes('.')) {
                errorElement.classList.add('show');
                return false;
            }
            
            errorElement.classList.remove('show');
            return true;
        }

        // Form submission
        async function submitForm(e) {
            e.preventDefault();
            
            if (!validateForm()) {
                return;
            }
            
            // Get email for display
            const email = document.getElementById('resetEmail').value.trim();
            
            // Show loading state
            const button = document.getElementById('next-button');
            button.textContent = 'Sending...';
            button.disabled = true;
            
            try {
                // Send forgot password request to backend API
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    // Hide form and show reset overlay
                    document.querySelector('.container').style.display = 'none';
                    
                    // Set email in overlay
                    document.getElementById('reset-email').textContent = email;
                    
                    // Show reset overlay
                    document.getElementById('reset-overlay').classList.add('active');
                    
                    console.log('Password reset email sent:', data);
                } else {
                    // Handle backend errors
                    throw new Error(data.message || 'Failed to send reset email');
                }
            } catch (error) {
                console.error('Forgot password error:', error);
                alert(error.message || 'Failed to send reset email. Please try again.');
                
                // Reset button state
                button.textContent = 'Next';
                button.disabled = false;
            }
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', function() {
            // Form submission
            document.getElementById('forgot-form').addEventListener('submit', submitForm);
            
            // Clear error on input
            document.getElementById('resetEmail').addEventListener('input', function() {
                document.getElementById('email-error').classList.remove('show');
            });
        });
    </script>
</body>
</html>
